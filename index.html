.tabs-bar{display:flex;gap:0;background:#1a2a4a;padding:10px 12px 0;border-bottom:3px solid #00695c;align-items:flex-end}
.tab-btn-wrap{position:relative;display:flex;align-items:center}

.tab-panel{display:none;width:100%;height:calc(100vh - 46px)}
.tab-panel.active{display:block}
.tab-frame{width:100%;height:100%;border:none;display:block;background:#f0f2f5}

.save-btn-wrap{margin-left:auto;display:flex;align-items:center;padding-bottom:9px}

.save-version-btn:hover{opacity:1;color:#00bfa5;border-color:#00bfa5;background:rgba(0,191,165,.08)}

:root{
  --font-sans: 'Segoe UI', Arial, sans-serif;
  --color-background-primary: #fff;
  --color-background-secondary: #f4f6f8;
  --color-text-primary: #1a1a2e;
  --color-text-secondary: #6b7280;
  --color-border-tertiary: #e2e8f0;
  --color-border-secondary: #cbd5e1;

&lt;style&gt;
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:13px}

.summary-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 0 .75rem 0}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.55rem .9rem}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px}
.metric-value{font-size:20px;font-weight:500;color:var(--color-text-primary)}

/* Turnos */
.turnos-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem}
.turno-card{border-radius:var(--border-radius-md);overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
.turno-head{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;font-size:11px;font-weight:500;color:#fff}
.turno-head-left{display:flex;align-items:center;gap:7px}
.t-a-head{background:#1565c0}
.t-b-head{background:#37474f}
.turno-body{padding:7px 10px;display:flex;flex-wrap:wrap;gap:4px;background:var(--color-background-secondary)}
.t-name{font-size:12px;padding:3px 10px;border-radius:12px;font-weight:700;letter-spacing:.3px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.t-a-name{background:#bbdefb;color:#1565c0}
.t-b-name{background:#cfd8dc;color:#37474f}

/* Botão editar turma */
.turno-edit-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;cursor:pointer;font-family:var(--font-sans);font-weight:500;letter-spacing:.3px;white-space:nowrap}
.turno-edit-btn:hover{background:rgba(255,255,255,.35)}

/* Modo edição turma */
.turno-edit-area{padding:8px 10px;background:var(--color-background-secondary);display:flex;flex-direction:column;gap:6px}
.turno-edit-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.t-name-edit{font-size:12px;padding:3px 10px;border-radius:12px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:5px}
.t-a-name-edit{background:#bbdefb;color:#1565c0}
.t-b-name-edit{background:#cfd8dc;color:#37474f}
.t-remove{background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;font-family:var(--font-sans)}
.t-remove:hover{background:rgba(255,0,0,.5)}
.turno-add-row{display:flex;gap:5px}
.turno-add-input{flex:1;border:0.5px solid #1565c0;border-radius:4px;padding:4px 8px;font-size:11px;font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-primary);outline:none;text-transform:uppercase}
.turno-add-input.tb{border-color:#546e7a}
.turno-add-input:focus{box-shadow:0 0 0 2px rgba(21,101,192,.2)}
.turno-add-btn{background:#1565c0;border:none;color:#fff;border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--font-sans);font-weight:600}
.turno-add-btn.tb{background:#37474f}
.turno-add-btn:hover{opacity:.85}

/* Folgas */
.folgas-panel{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:.65rem .9rem;margin-bottom:.75rem}
.folgas-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem}
.folgas-grid{display:flex;flex-wrap:wrap;gap:5px}
.f-btn{padding:3px 9px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:11px;cursor:pointer;font-family:var(--font-sans)}
.f-btn.on{background:#fff3cd;color:#92600a;border-color:#ffc107}

/* Legenda */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:.75rem;font-size:11px;color:var(--color-text-secondary);align-items:center}
.leg-item{display:flex;align-items:center;gap:4px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-ok{background:#22c55e}
.dot-folga{background:#f59e0b}
.dot-empty{background:#bbb}

/* Wrapper da tabela */
.dist-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:1rem}

/* Header principal — compacto, título centralizado */
.dist-main-header{background:#3d3d3d;padding:6px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.dist-main-center{display:flex;flex-direction:column;align-items:center;justify-content:center}
.dist-main-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:2px;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.dist-main-date{font-size:10px;color:#bbb;text-align:right}
.dist-main-left{font-size:10px;color:transparent} /* spacer */
.proc-header{background:#3d3d3d;color:#fff;text-align:center;font-size:18px;font-weight:800;padding:8px;letter-spacing:2px;border-top:1px solid rgba(255,255,255,.2);text-shadow:0 1px 4px rgba(0,0,0,.3)}

/* Áreas */
.areas-header{display:grid;grid-template-columns:1fr 1fr 1fr}
.area-head-cell{display:flex;align-items:center;justify-content:center;padding:12px 14px;border-right:1px solid rgba(255,255,255,.15)}
.area-head-cell:last-child{border-right:none}
.area-head-name{font-size:22px;font-weight:900;color:#fff;letter-spacing:2px;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.4);-webkit-print-color-adjust:exact;print-color-adjust:exact}
.ah-checkout{background:linear-gradient(135deg,#5a5a5a,#4a4a4a)}
.ah-inducao{background:linear-gradient(135deg,#5a5a5a,#4a4a4a)}
.ah-sorting{background:linear-gradient(135deg,#5a5a5a,#4a4a4a)}

/* Colunas */
.cols-wrap{display:grid;grid-template-columns:1fr 1fr 1fr}
.col-block{border-right:0.5px solid var(--color-border-tertiary)}
.col-block:last-child{border-right:none}
.col-row{display:flex;align-items:center;padding:6px 10px;border-top:0.5px solid var(--color-border-tertiary);min-height:40px;gap:6px}
.col-row:hover{background:var(--color-background-secondary)}

.sel-wrap{position:relative;flex:1;min-width:0}
.sel-wrap select{width:100%;appearance:none;background:#fde68a;border:0.5px solid #f3c969;border-radius:4px;padding:6px 20px 6px 7px;font-size:15px;text-align:center;text-align-last:center;color:#1a1a2e;cursor:pointer;font-family:var(--font-sans);font-weight:800}
.sel-wrap select.empty{background:var(--color-background-secondary);border-color:var(--color-border-secondary);color:var(--color-text-secondary)}
.sel-wrap select.folga-sel{background:#c0392b;border-color:#e74c3c;color:#fff}
.sel-wrap::after{content:'▾';position:absolute;right:6px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:9px;color:rgba(255,255,255,.5)}
.sel-wrap.empty::after{color:var(--color-text-secondary)}

.tag{font-size:9px;border-radius:8px;padding:1px 5px;white-space:nowrap;font-weight:500;flex-shrink:0}
.tag-folga{background:#fff3cd;color:#92600a;border:0.5px solid #ffc107}
.tag-ta{background:#1565c0;color:#fff;border:0.5px solid #1565c0}
.tag-tb{background:#37474f;color:#fff;border:0.5px solid #546e7a}

/* Separador áreas inferiores */
.sep-areas{display:grid;grid-template-columns:1fr 1fr 1fr}
.sep-cell{display:flex;align-items:center;justify-content:center;padding:12px 14px;border-right:1px solid rgba(255,255,255,.15)}
.sep-cell:last-child{border-right:none}
.sep-name{font-size:22px;font-weight:900;color:#fff;letter-spacing:2px;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.4);-webkit-print-color-adjust:exact;print-color-adjust:exact}
.sep-name .red{color:#fff}
.sep-bg-pesca{background:linear-gradient(135deg,#5a5a5a,#4a4a4a)}
.sep-bg-mov{background:linear-gradient(135deg,#5a5a5a,#4a4a4a)}
.sep-bg-vol{background:linear-gradient(135deg,#5a5a5a,#4a4a4a)}

/* DSR */
.dsr-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.dsr-head{background:#c0392b;color:#fff;font-size:11px;font-weight:500;padding:6px 10px;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between}
.dsr-edit-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;cursor:pointer;font-family:var(--font-sans);font-weight:500;letter-spacing:.3px}
.dsr-edit-btn:hover{background:rgba(255,255,255,.35)}
.dsr-row{display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px}
.dsr-row:last-child{border-bottom:none}
.dsr-day{font-weight:500;color:var(--color-text-primary);min-width:100px}
.dsr-ppl{color:var(--color-text-secondary);flex:1}
.dsr-input{flex:1;border:0.5px solid #c0392b;border-radius:4px;padding:3px 7px;font-size:11px;font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-primary);outline:none}
.dsr-input:focus{border-color:#e74c3c;box-shadow:0 0 0 2px rgba(192,57,43,.15)}
&lt;/style&gt;

      &lt;/div&gt;&lt;div class=&quot;col-row&quot;&gt;
        &lt;span class=&quot;dot dot-empty&quot;&gt;&lt;/span&gt;
        &lt;div class=&quot;sel-wrap empty&quot;&gt;
          &lt;select class=&quot;empty&quot; data-key=&quot;volumoso_8&quot; onchange=&quot;onSel(this)&quot;&gt;&lt;option value=&quot;&quot;&gt;—&lt;/option&gt;&lt;option value=&quot;ANA&quot;&gt;ANA&lt;/option&gt;&lt;option value=&quot;THIAGO&quot;&gt;THIAGO&lt;/option&gt;&lt;option value=&quot;HITILY&quot;&gt;HITILY&lt;/option&gt;&lt;option value=&quot;DENIS&quot;&gt;DENIS&lt;/option&gt;&lt;option value=&quot;BRUNO&quot;&gt;BRUNO&lt;/option&gt;&lt;option value=&quot;JEFERSON MARTINS&quot;&gt;JEFERSON MARTINS&lt;/option&gt;&lt;option value=&quot;ANGELA&quot;&gt;ANGELA&lt;/option&gt;&lt;option value=&quot;GEOVANE&quot;&gt;GEOVANE&lt;/option&gt;&lt;option value=&quot;LUCIANO&quot;&gt;LUCIANO&lt;/option&gt;&lt;option value=&quot;JOSEILTON&quot;&gt;JOSEILTON&lt;/option&gt;&lt;option value=&quot;SILLAS&quot;&gt;SILLAS&lt;/option&gt;&lt;option value=&quot;ADRIAN&quot;&gt;ADRIAN&lt;/option&gt;&lt;option value=&quot;SAMUEL&quot;&gt;SAMUEL&lt;/option&gt;&lt;option value=&quot;RAFAEL&quot;&gt;RAFAEL&lt;/option&gt;&lt;option value=&quot;JOÃO VICTOR&quot;&gt;JOÃO VICTOR&lt;/option&gt;&lt;option value=&quot;JEFERSON&quot;&gt;JEFERSON&lt;/option&gt;&lt;option value=&quot;PEDRO&quot;&gt;PEDRO&lt;/option&gt;&lt;/select&gt;
        &lt;/div&gt;
        
      &lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;dsr-wrap&quot;&gt;
  &lt;div class=&quot;dsr-head&quot;&gt;
    &lt;span&gt;📋 DSR SEMANAL&lt;/span&gt;
    &lt;button class=&quot;dsr-edit-btn&quot; id=&quot;dsr-edit-btn&quot; onclick=&quot;toggleDsrEdit()&quot;&gt;✏️ Editar&lt;/button&gt;
  &lt;/div&gt;
  &lt;div id=&quot;dsr-body&quot;&gt;
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Segunda-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Jeferson Martins / Angela&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Terça-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Samuel / Jeferson&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Quarta-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Joseilton / Denis&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Quinta-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Rafael Rodrigues / Adrian&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Sexta-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Sillas / Pedro / Thiago&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Sábado:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Bruno Rafael / Ana / Lucivânia&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Domingo:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;João Victor / Guilherme / Luciano&lt;/span&gt;&lt;/div&gt;
  &lt;/div&gt;

&lt;script&gt;
const ROWS = 9;
let TURMA_A = ['ANA','THIAGO','HITILY','DENIS','BRUNO','JEFERSON MARTINS','ANGELA','GEOVANE'];
let TURMA_B = ['LUCIANO','JOSEILTON','SILLAS','ADRIAN','SAMUEL','RAFAEL','JOÃO VICTOR','JEFERSON','PEDRO'];

function getTODOS(){return [...TURMA_A,...TURMA_B];}
function turmaOf(n){return TURMA_A.includes(n)?'A':TURMA_B.includes(n)?'B':null;}
function renameMember(turma, idx, el){
  el.setAttribute('contenteditable','true');
  el.focus();
  document.execCommand('selectAll', false, null);
  function commit(){
    el.removeEventListener('blur', commit);
    el.removeEventListener('keydown', onKeyDown);
    el.setAttribute('contenteditable','false');
    const novo = el.textContent.trim().toUpperCase();
    const arr = turma==='A' ? TURMA_A : TURMA_B;
    if(novo &amp;&amp; novo !== arr[idx]){ arr[idx] = novo; }
    if(typeof buildTurmaNames==='function') buildTurmaNames();
    if(typeof buildFolgas==='function') buildFolgas();
    if(typeof render==='function') render();
    if(typeof updateMetrics==='function') updateMetrics();
    if(typeof buildPsTable==='function') buildPsTable();
    if(typeof buildResp==='function') buildResp();
  }
  function onKeyDown(ev){ if(ev.key==='Enter'){ ev.preventDefault(); el.blur(); } }
  el.addEventListener('blur', commit);
  el.addEventListener('keydown', onKeyDown);
}


const TOP_AREAS=[{id:'checkout'},{id:'inducao'},{id:'sorting'}];
const BOT_AREAS=[{id:'pesca'},{id:'moviment'},{id:'volumoso'}];
const ALL=[...TOP_AREAS,...BOT_AREAS];

const DSR=[
  {dia:'Segunda-feira',ppl:'Jeferson Martins / Angela'},
  {dia:'Terça-feira',ppl:'Samuel / Jeferson'},
  {dia:'Quarta-feira',ppl:'Joseilton / Denis'},
  {dia:'Quinta-feira',ppl:'Rafael Rodrigues / Adrian'},
  {dia:'Sexta-feira',ppl:'Sillas / Pedro / Thiago'},
  {dia:'Sábado',ppl:'Bruno Rafael / Ana / Lucivânia'},
  {dia:'Domingo',ppl:'João Victor / Guilherme / Luciano'},
];

const folgas=new Set();
const state={};
ALL.forEach(a=&gt;{for(let i=0;i&lt;ROWS;i++)state[`${a.id}_${i}`]='';});

function g(id){return document.getElementById(id);}

// ── TURMAS ──────────────────────────────────────────────
let turnoEditMode = {A: false, B: false};

function buildTurmaNames(){
  const renderList = (arr, cls) =&gt; arr.map((n,i)=&gt;`&lt;span class=&quot;t-name ${cls}&quot; ondblclick=&quot;renameMember('${cls.indexOf('a')&gt;-1?'A':'B'}',${i},this)&quot; title=&quot;Duplo-clique para renomear&quot;&gt;${n}&lt;/span&gt;`).join('');
  g('turma-a-names').innerHTML = renderList(TURMA_A,'t-a-name');
  g('turma-b-names').innerHTML = renderList(TURMA_B,'t-b-name');
}

function toggleTurnoEdit(turma){
  const t = turma;
  turnoEditMode[t] = !turnoEditMode[t];
  const btn = g(`edit-btn-${t.toLowerCase()}`);
  const bodyEl = g(`turma-${t.toLowerCase()}-body`);

  if(turnoEditMode[t]){
    btn.textContent = '✅ Salvar';
    const arr = t==='A' ? TURMA_A : TURMA_B;
    const cls = t==='A' ? 'a' : 'b';
    bodyEl.innerHTML = `
      &lt;div class=&quot;turno-edit-area&quot;&gt;
        &lt;div class=&quot;turno-edit-list&quot; id=&quot;edit-list-${t}&quot;&gt;
          ${arr.map((n,i)=&gt;`
            &lt;span class=&quot;t-name-edit t-${cls}-name-edit&quot;&gt;
              ${n}
              &lt;button class=&quot;t-remove&quot; onclick=&quot;removeFromTurma('${t}',${i})&quot;&gt;✕&lt;/button&gt;
            &lt;/span&gt;
          `).join('')}
        &lt;/div&gt;
        &lt;div class=&quot;turno-add-row&quot;&gt;
          &lt;input class=&quot;turno-add-input ${cls==='b'?'tb':''}&quot; id=&quot;add-inp-${t}&quot; placeholder=&quot;Novo colaborador...&quot; onkeydown=&quot;if(event.key==='Enter')addToTurma('${t}')&quot;&gt;
          &lt;button class=&quot;turno-add-btn ${cls==='b'?'tb':''}&quot; onclick=&quot;addToTurma('${t}')&quot;&gt;+ Adicionar&lt;/button&gt;
        &lt;/div&gt;
      &lt;/div&gt;`;
  } else {
    btn.textContent = '✏️ Editar';
    // reconstrói a view normal
    const arr = t==='A' ? TURMA_A : TURMA_B;
    const cls = t==='A' ? 't-a-name' : 't-b-name';
    bodyEl.innerHTML = `&lt;div class=&quot;turno-body&quot; id=&quot;turma-${t.toLowerCase()}-names&quot;&gt;
      ${arr.map((n,i)=&gt;`&lt;span class=&quot;t-name ${cls}&quot; ondblclick=&quot;renameMember('${cls.indexOf('a')&gt;-1?'A':'B'}',${i},this)&quot; title=&quot;Duplo-clique para renomear&quot;&gt;${n}&lt;/span&gt;`).join('')}
    &lt;/div&gt;`;
    buildFolgas();
    render();
  }
}

function removeFromTurma(turma, idx){
  const arr = turma==='A' ? TURMA_A : TURMA_B;
  arr.splice(idx,1);
  // rerender edit mode
  turnoEditMode[turma] = false;
  const bodyEl = g(`turma-${turma.toLowerCase()}-body`);
  const cls = turma==='A' ? 't-a-name' : 't-b-name';
  bodyEl.innerHTML = `&lt;div class=&quot;turno-body&quot; id=&quot;turma-${turma.toLowerCase()}-names&quot;&gt;
    ${arr.map((n,i)=&gt;`&lt;span class=&quot;t-name ${cls}&quot; ondblclick=&quot;renameMember('${cls.indexOf('a')&gt;-1?'A':'B'}',${i},this)&quot; title=&quot;Duplo-clique para renomear&quot;&gt;${n}&lt;/span&gt;`).join('')}
  &lt;/div&gt;`;
  g(`edit-btn-${turma.toLowerCase()}`).textContent = '✏️ Editar';
  buildFolgas();
  render();
}

function addToTurma(turma){
  const inp = g(`add-inp-${turma}`);
  const nome = inp.value.trim().toUpperCase();
  if(!nome) return;
  const arr = turma==='A' ? TURMA_A : TURMA_B;
  if(!arr.includes(nome)){
    arr.push(nome);
  }
  inp.value='';
  // rerender edit mode
  turnoEditMode[turma] = false;
  const bodyEl = g(`turma-${turma.toLowerCase()}-body`);
  const cls = turma==='A' ? 't-a-name' : 't-b-name';
  bodyEl.innerHTML = `&lt;div class=&quot;turno-body&quot; id=&quot;turma-${turma.toLowerCase()}-names&quot;&gt;
    ${arr.map((n,i)=&gt;`&lt;span class=&quot;t-name ${cls}&quot; ondblclick=&quot;renameMember('${cls.indexOf('a')&gt;-1?'A':'B'}',${i},this)&quot; title=&quot;Duplo-clique para renomear&quot;&gt;${n}&lt;/span&gt;`).join('')}
  &lt;/div&gt;`;
  g(`edit-btn-${turma.toLowerCase()}`).textContent = '✏️ Editar';
  buildFolgas();
  render();
}

// ── FOLGAS ──────────────────────────────────────────────
function buildFolgas(){
  g('folgas-grid').innerHTML=getTODOS().map(c=&gt;`
    &lt;button class=&quot;f-btn${folgas.has(c)?' on':''}&quot; onclick=&quot;toggleFolga('${c}')&quot;&gt;${folgas.has(c)?'🏖 ':''}${c}&lt;/button&gt;
  `).join('');
}
function toggleFolga(n){folgas.has(n)?folgas.delete(n):folgas.add(n);buildFolgas();render();}

// ── COLUNAS ──────────────────────────────────────────────
function opts(sel){
  let o='&lt;option value=&quot;&quot;&gt;—&lt;/option&gt;';
  getTODOS().forEach(c=&gt;{
    o+=`&lt;option value=&quot;${c}&quot;${sel===c?' selected':''}&gt;${c}${folgas.has(c)?' 🏖':''}&lt;/option&gt;`;
  });
  return o;
}

function buildCols(areas,containerId){
  const wrap=g(containerId);
  wrap.innerHTML='';
  areas.forEach(area=&gt;{
    const col=document.createElement('div');
    col.className='col-block';
    let rows='';
    for(let i=0;i&lt;ROWS;i++){
      const key=`${area.id}_${i}`;
      const val=state[key];
      const isFolga=val&amp;&amp;folgas.has(val);
      const turma=val?turmaOf(val):null;
      const selClass=val?(isFolga?'folga-sel':''):'empty';
      const dotClass=val?(isFolga?'dot-folga':'dot-ok'):'dot-empty';
      const tagFolga=isFolga?'&lt;span class=&quot;tag tag-folga&quot;&gt;🏖&lt;/span&gt;':'';
      const tagTurma=(!isFolga&amp;&amp;turma)?`&lt;span class=&quot;tag tag-t${turma.toLowerCase()}&quot;&gt;T${turma}&lt;/span&gt;`:'';
      rows+=`&lt;div class=&quot;col-row&quot;&gt;
        &lt;span class=&quot;dot ${dotClass}&quot;&gt;&lt;/span&gt;
        &lt;div class=&quot;sel-wrap${!val?' empty':''}&quot;&gt;
          &lt;select class=&quot;${selClass}&quot; data-key=&quot;${key}&quot; onchange=&quot;onSel(this)&quot;&gt;${opts(val)}&lt;/select&gt;
        &lt;/div&gt;
        ${tagFolga}${tagTurma}
      &lt;/div&gt;`;
    }
    col.innerHTML=rows;
    wrap.appendChild(col);
  });
}

function onSel(el){state[el.dataset.key]=el.value;render();}

function render(){
  buildCols(TOP_AREAS,'top-cols');
  buildCols(BOT_AREAS,'bot-cols');
  let aloc=0,folga=0;
  Object.values(state).forEach(v=&gt;{if(v){aloc++;if(folgas.has(v))folga++;}});
  g('s-aloc').textContent=aloc;
  g('s-folga').textContent=folga;
}

// ── DSR ──────────────────────────────────────────────────
let dsrEditMode = false;

function toggleDsrEdit(){
  dsrEditMode = !dsrEditMode;
  const btn = g('dsr-edit-btn');
  if(dsrEditMode){
    btn.textContent = '✅ Salvar';
    g('dsr-body').innerHTML=DSR.map((r,i)=&gt;`
      &lt;div class=&quot;dsr-row&quot;&gt;
        &lt;span class=&quot;dsr-day&quot;&gt;${r.dia}:&lt;/span&gt;
        &lt;input class=&quot;dsr-input&quot; id=&quot;dsr-inp-${i}&quot; value=&quot;${r.ppl}&quot; placeholder=&quot;Nomes...&quot;&gt;
      &lt;/div&gt;
    `).join('');
  } else {
    DSR.forEach((r,i)=&gt;{const inp=g(`dsr-inp-${i}`);if(inp)r.ppl=inp.value;});
    btn.textContent = '✏️ Editar';
    buildDsr();
  }
}

function buildDsr(){
  g('dsr-body').innerHTML=DSR.map(r=&gt;`
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;${r.dia}:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;${r.ppl}&lt;/span&gt;&lt;/div&gt;
  `).join('');
}

// ── INIT ─────────────────────────────────────────────────
g('top-date').innerHTML=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
buildTurmaNames();
buildFolgas();
buildDsr();
render();
&lt;/script&gt;

.folgas-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem}
.folgas-grid{display:flex;flex-wrap:wrap;gap:5px}
.f-btn{padding:3px 9px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:#fff;color:var(--color-text-primary);font-size:11px;cursor:pointer;font-family:var(--font-sans)}

/* Legenda */

.leg-item{display:flex;align-items:center;gap:4px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-ok{background:#22c55e}
.dot-folga{background:#f59e0b}
.dot-empty{background:#bbb}

/* Wrapper da tabela */
.dist-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:1rem;background:#fff}

/* Header principal */
.dist-main-header{background:#1a1a1a;padding:6px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.dist-main-center{display:flex;flex-direction:column;align-items:center;justify-content:center}
.dist-main-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:2px;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.dist-main-date{font-size:10px;color:#bbb;text-align:right}
.dist-main-left{font-size:10px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.proc-header{background:#1a1a1a;color:#fff;text-align:center;font-size:18px;font-weight:800;padding:8px;letter-spacing:2px;border-top:1px solid rgba(255,255,255,.2);text-shadow:0 1px 4px rgba(0,0,0,.3)}

/* Edição de áreas */
.area-name-input{width:100%;background:rgba(255,255,255,.15);border:0.5px solid rgba(255,255,255,.5);border-radius:4px;color:#fff;font-size:12px;font-weight:900;text-align:center;text-transform:uppercase;padding:5px 2px;font-family:var(--font-sans);outline:none;letter-spacing:1px}
.area-name-input:focus{background:rgba(255,255,255,.28);border-color:#fff}

/* Áreas — 5 colunas topo */
.areas-header-5{display:grid;grid-template-columns:repeat(5,1fr)}
.areas-header-5 .area-head-cell{display:flex;align-items:center;justify-content:center;padding:10px 6px;border-right:1px solid rgba(255,255,255,.15)}
.areas-header-5 .area-head-cell:last-child{border-right:none}
.area-head-name{font-size:13px;font-weight:900;color:#fff;letter-spacing:1.5px;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.4);-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* Gradientes das áreas — topo */
.ah-expedicao{background:linear-gradient(135deg,#2b2b2b,#1a1a1a)}
.ah-yms{background:linear-gradient(135deg,#1a1a1a,#101010)}
.ah-inventario{background:linear-gradient(135deg,#101010,#000)}
.ah-respcarreta{background:linear-gradient(135deg,#000,#1a1a1a)}
.ah-descarreg{background:linear-gradient(135deg,#1a1a1a,#000)}

/* Gradientes das áreas — baixo */

.ah-berenice{background:linear-gradient(135deg,#141414,#000)}
.ah-prelayout{background:linear-gradient(135deg,#000,#262626)}
.ah-sacas{background:linear-gradient(135deg,#262626,#141414)}
.ah-devolucao{background:linear-gradient(135deg,#141414,#000)}

/* Gradientes para aba 2 (quase preto) */

.ah2-area4{background:linear-gradient(135deg,#1a1a1a,#262626)}

.ah2-area6{background:linear-gradient(135deg,#222,#111)}
.ah2-area7{background:linear-gradient(135deg,#111,#222)}
.ah2-area8{background:linear-gradient(135deg,#262626,#111)}
.ah2-area9{background:linear-gradient(135deg,#111,#262626)}
.ah2-area10{background:linear-gradient(135deg,#000,#2b2b2b)}

.ah3-area2{background:linear-gradient(135deg,#bf360c,#b71c1c)}
.ah3-area3{background:linear-gradient(135deg,#b71c1c,#e65100)}
.ah3-area4{background:linear-gradient(135deg,#e65100,#b71c1c)}
.ah3-area5{background:linear-gradient(135deg,#bf360c,#e65100)}

.tag{font-size:9px;border-radius:8px;padding:1px 5px;white-space:nowrap;font-weight:500;flex-shrink:0}

.tag-ta{background:#1565c0;color:#fff;border:0.5px solid #1565c0}

.sep-cell{display:flex;align-items:center;justify-content:center;padding:10px 6px;border-right:1px solid rgba(255,255,255,.15)}

        &lt;span class=&quot;dot dot-empty&quot;&gt;&lt;/span&gt;
        &lt;div class=&quot;sel-wrap empty&quot;&gt;
          &lt;select class=&quot;empty&quot; data-key=&quot;devolucao_6&quot; onchange=&quot;onSel(this)&quot;&gt;&lt;option value=&quot;&quot;&gt;—&lt;/option&gt;&lt;option value=&quot;ANA&quot;&gt;ANA&lt;/option&gt;&lt;option value=&quot;THIAGO&quot;&gt;THIAGO&lt;/option&gt;&lt;option value=&quot;HITILY&quot;&gt;HITILY&lt;/option&gt;&lt;option value=&quot;DENIS&quot;&gt;DENIS&lt;/option&gt;&lt;option value=&quot;BRUNO&quot;&gt;BRUNO&lt;/option&gt;&lt;option value=&quot;JEFERSON MARTINS&quot;&gt;JEFERSON MARTINS&lt;/option&gt;&lt;option value=&quot;ANGELA&quot;&gt;ANGELA&lt;/option&gt;&lt;option value=&quot;GEOVANE&quot;&gt;GEOVANE&lt;/option&gt;&lt;option value=&quot;LUCIANO&quot;&gt;LUCIANO&lt;/option&gt;&lt;option value=&quot;JOSEILTON&quot;&gt;JOSEILTON&lt;/option&gt;&lt;option value=&quot;SILLAS&quot;&gt;SILLAS&lt;/option&gt;&lt;option value=&quot;ADRIAN&quot;&gt;ADRIAN&lt;/option&gt;&lt;option value=&quot;SAMUEL&quot;&gt;SAMUEL&lt;/option&gt;&lt;option value=&quot;RAFAEL&quot;&gt;RAFAEL&lt;/option&gt;&lt;option value=&quot;JOÃO VICTOR&quot;&gt;JOÃO VICTOR&lt;/option&gt;&lt;option value=&quot;JEFERSON&quot;&gt;JEFERSON&lt;/option&gt;&lt;option value=&quot;PEDRO&quot;&gt;PEDRO&lt;/option&gt;&lt;/select&gt;
        &lt;/div&gt;
        
      &lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;dsr-wrap&quot;&gt;
  &lt;div class=&quot;dsr-head&quot;&gt;
    &lt;span&gt;📋 DSR SEMANAL&lt;/span&gt;
    &lt;button class=&quot;dsr-edit-btn&quot; id=&quot;dsr-edit-btn&quot; onclick=&quot;toggleDsrEdit()&quot;&gt;✏️ Editar&lt;/button&gt;
  &lt;/div&gt;
  &lt;div id=&quot;dsr-body&quot;&gt;
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Segunda-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Jeferson Martins / Angela&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Terça-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Samuel / Jeferson&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Quarta-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Joseilton / Denis&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Quinta-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Rafael Rodrigues / Adrian&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Sexta-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Sillas / Pedro / Thiago&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Sábado:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Bruno Rafael / Ana / Lucivânia&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Domingo:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;João Victor / Guilherme / Luciano&lt;/span&gt;&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;


&lt;script&gt;

// ══════════════════════════════════════════════
// LÓGICA DA ABA 1 (idêntica ao original + limpar)
// ══════════════════════════════════════════════
const ROWS = 7;
let TURMA_A = ['ANA','THIAGO','HITILY','DENIS','BRUNO','JEFERSON MARTINS','ANGELA','GEOVANE'];
let TURMA_B = ['LUCIANO','JOSEILTON','SILLAS','ADRIAN','SAMUEL','RAFAEL','JOÃO VICTOR','JEFERSON','PEDRO'];

function getTODOS(){return [...TURMA_A,...TURMA_B];}
function turmaOf(n){return TURMA_A.includes(n)?'A':TURMA_B.includes(n)?'B':null;}
function renameMember(turma, idx, el){
  el.setAttribute('contenteditable','true');
  el.focus();
  document.execCommand('selectAll', false, null);
  function commit(){
    el.removeEventListener('blur', commit);
    el.removeEventListener('keydown', onKeyDown);
    el.setAttribute('contenteditable','false');
    const novo = el.textContent.trim().toUpperCase();
    const arr = turma==='A' ? TURMA_A : TURMA_B;
    if(novo &amp;&amp; novo !== arr[idx]){ arr[idx] = novo; }
    if(typeof buildTurmaNames==='function') buildTurmaNames();
    if(typeof buildFolgas==='function') buildFolgas();
    if(typeof render==='function') render();
    if(typeof updateMetrics==='function') updateMetrics();
    if(typeof buildPsTable==='function') buildPsTable();
    if(typeof buildResp==='function') buildResp();
  }
  function onKeyDown(ev){ if(ev.key==='Enter'){ ev.preventDefault(); el.blur(); } }
  el.addEventListener('blur', commit);
  el.addEventListener('keydown', onKeyDown);
}


const TOP_AREAS=[
  {id:'expedicao',name:'EXPEDIÇÃO PM'},
  {id:'yms',name:'YMS PM'},
  {id:'inventario',name:'INVENTÁRIO'},
  {id:'respcarreta',name:'RESP. CARRETA'},
  {id:'descarreg',name:'DESCARREG.'}
];
const BOT_AREAS=[
  {id:'orgqr',name:'ORGANIZ. QR'},
  {id:'berenice',name:'BERENICE'},
  {id:'prelayout',name:'PRÉ-LAYOUT'},
  {id:'sacas',name:'SACAS'},
  {id:'devolucao',name:'DEVOLUÇÃO'}
];
const ALL=[...TOP_AREAS,...BOT_AREAS];

const DSR=[
  {dia:'Segunda-feira',ppl:'Jeferson Martins / Angela'},
  {dia:'Terça-feira',ppl:'Samuel / Jeferson'},
  {dia:'Quarta-feira',ppl:'Joseilton / Denis'},
  {dia:'Quinta-feira',ppl:'Rafael Rodrigues / Adrian'},
  {dia:'Sexta-feira',ppl:'Sillas / Pedro / Thiago'},
  {dia:'Sábado',ppl:'Bruno Rafael / Ana / Lucivânia'},
  {dia:'Domingo',ppl:'João Victor / Guilherme / Luciano'},
];

const folgas=new Set();
const state={};
ALL.forEach(a=&gt;{
  const areaBadges = {};
  if(a.id==='respcarreta'){areaBadges[2]=true;areaBadges[5]=true;}
  for(let i=0;i&lt;ROWS;i++){
    if(!areaBadges[i]) state[`${a.id}_${i}`]='';
  }
});

function g(id){return document.getElementById(id);}

// ── LIMPAR DISTRIBUIÇÃO ──────────────────────────────────
function limparDistribuicao(){
  if(!confirm('Limpar todos os nomes da distribuição? Os nomes das turmas e folgas NÃO serão apagados.')) return;
  Object.keys(state).forEach(k=&gt;{ state[k]=''; });
  render();
}

// ── ÁREAS ────────────────────────────────────────────────
let areasEditMode = false;

function buildAreaHeaders(){
  g('top-areas-header').innerHTML = TOP_AREAS.map(a=&gt;`
    &lt;div class=&quot;area-head-cell ah-${a.id}&quot;&gt;&lt;span class=&quot;area-head-name&quot;&gt;${a.name}&lt;/span&gt;&lt;/div&gt;
  `).join('');
  g('bot-areas-header').innerHTML = BOT_AREAS.map(a=&gt;`
    &lt;div class=&quot;sep-cell ah-${a.id}&quot;&gt;&lt;span class=&quot;sep-name&quot;&gt;${a.name}&lt;/span&gt;&lt;/div&gt;
  `).join('');
}

function toggleAreasEdit(){
  areasEditMode = !areasEditMode;
  const btn = g('areas-edit-btn');
  if(areasEditMode){
    btn.textContent = '✅ Salvar Áreas';
    g('top-areas-header').innerHTML = TOP_AREAS.map((a,i)=&gt;`
      &lt;div class=&quot;area-head-cell ah-${a.id}&quot;&gt;&lt;input class=&quot;area-name-input&quot; id=&quot;area-inp-top-${i}&quot; value=&quot;${a.name}&quot; onkeydown=&quot;if(event.key==='Enter')toggleAreasEdit()&quot;&gt;&lt;/div&gt;
    `).join('');
    g('bot-areas-header').innerHTML = BOT_AREAS.map((a,i)=&gt;`
      &lt;div class=&quot;sep-cell ah-${a.id}&quot;&gt;&lt;input class=&quot;area-name-input&quot; id=&quot;area-inp-bot-${i}&quot; value=&quot;${a.name}&quot; onkeydown=&quot;if(event.key==='Enter')toggleAreasEdit()&quot;&gt;&lt;/div&gt;
    `).join('');
    render();
  } else {
    TOP_AREAS.forEach((a,i)=&gt;{const inp=g(`area-inp-top-${i}`);if(inp&amp;&amp;inp.value.trim())a.name=inp.value.trim().toUpperCase();});
    BOT_AREAS.forEach((a,i)=&gt;{const inp=g(`area-inp-bot-${i}`);if(inp&amp;&amp;inp.value.trim())a.name=inp.value.trim().toUpperCase();});
    saveBadgeEdits();
    btn.textContent = '✏️ Editar Áreas';
    buildAreaHeaders();
    render();
  }
}

// ── TURMAS ──────────────────────────────────────────────
let turnoEditMode = {A: false, B: false};

function buildTurmaNames(){
  const renderList = (arr, cls) =&gt; arr.map((n,i)=&gt;`&lt;span class=&quot;t-name ${cls}&quot; ondblclick=&quot;renameMember('${cls.indexOf('a')&gt;-1?'A':'B'}',${i},this)&quot; title=&quot;Duplo-clique para renomear&quot;&gt;${n}&lt;/span&gt;`).join('');
  g('turma-a-names').innerHTML = renderList(TURMA_A,'t-a-name');
  g('turma-b-names').innerHTML = renderList(TURMA_B,'t-b-name');
}

function toggleTurnoEdit(turma){
  const t = turma;
  turnoEditMode[t] = !turnoEditMode[t];
  const btn = g(`edit-btn-${t.toLowerCase()}`);
  const bodyEl = g(`turma-${t.toLowerCase()}-body`);

  if(turnoEditMode[t]){
    btn.textContent = '✅ Salvar';
    const arr = t==='A' ? TURMA_A : TURMA_B;
    const cls = t==='A' ? 'a' : 'b';
    bodyEl.innerHTML = `
      &lt;div class=&quot;turno-edit-area&quot;&gt;
        &lt;div class=&quot;turno-edit-list&quot; id=&quot;edit-list-${t}&quot;&gt;
          ${arr.map((n,i)=&gt;`
            &lt;span class=&quot;t-name-edit t-${cls}-name-edit&quot;&gt;
              ${n}
              &lt;button class=&quot;t-remove&quot; onclick=&quot;removeFromTurma('${t}',${i})&quot;&gt;✕&lt;/button&gt;
            &lt;/span&gt;
          `).join('')}
        &lt;/div&gt;
        &lt;div class=&quot;turno-add-row&quot;&gt;
          &lt;input class=&quot;turno-add-input ${cls==='b'?'tb':''}&quot; id=&quot;add-inp-${t}&quot; placeholder=&quot;Novo colaborador...&quot; onkeydown=&quot;if(event.key==='Enter')addToTurma('${t}')&quot;&gt;
          &lt;button class=&quot;turno-add-btn ${cls==='b'?'tb':''}&quot; onclick=&quot;addToTurma('${t}')&quot;&gt;+ Adicionar&lt;/button&gt;
        &lt;/div&gt;
      &lt;/div&gt;`;
  } else {
    btn.textContent = '✏️ Editar';
    const arr = t==='A' ? TURMA_A : TURMA_B;
    const cls = t==='A' ? 't-a-name' : 't-b-name';
    bodyEl.innerHTML = `&lt;div class=&quot;turno-body&quot; id=&quot;turma-${t.toLowerCase()}-names&quot;&gt;
      ${arr.map((n,i)=&gt;`&lt;span class=&quot;t-name ${cls}&quot; ondblclick=&quot;renameMember('${cls.indexOf('a')&gt;-1?'A':'B'}',${i},this)&quot; title=&quot;Duplo-clique para renomear&quot;&gt;${n}&lt;/span&gt;`).join('')}
    &lt;/div&gt;`;
    buildFolgas();
    render();
  }
}

function removeFromTurma(turma, idx){
  const arr = turma==='A' ? TURMA_A : TURMA_B;
  arr.splice(idx,1);
  turnoEditMode[turma] = false;
  const bodyEl = g(`turma-${turma.toLowerCase()}-body`);
  const cls = turma==='A' ? 't-a-name' : 't-b-name';
  bodyEl.innerHTML = `&lt;div class=&quot;turno-body&quot; id=&quot;turma-${turma.toLowerCase()}-names&quot;&gt;
    ${arr.map((n,i)=&gt;`&lt;span class=&quot;t-name ${cls}&quot; ondblclick=&quot;renameMember('${cls.indexOf('a')&gt;-1?'A':'B'}',${i},this)&quot; title=&quot;Duplo-clique para renomear&quot;&gt;${n}&lt;/span&gt;`).join('')}
  &lt;/div&gt;`;
  g(`edit-btn-${turma.toLowerCase()}`).textContent = '✏️ Editar';
  buildFolgas();
  render();
}

function addToTurma(turma){
  const inp = g(`add-inp-${turma}`);
  const nome = inp.value.trim().toUpperCase();
  if(!nome) return;
  const arr = turma==='A' ? TURMA_A : TURMA_B;
  if(!arr.includes(nome)) arr.push(nome);
  inp.value='';
  turnoEditMode[turma] = false;
  const bodyEl = g(`turma-${turma.toLowerCase()}-body`);
  const cls = turma==='A' ? 't-a-name' : 't-b-name';
  bodyEl.innerHTML = `&lt;div class=&quot;turno-body&quot; id=&quot;turma-${turma.toLowerCase()}-names&quot;&gt;
    ${arr.map((n,i)=&gt;`&lt;span class=&quot;t-name ${cls}&quot; ondblclick=&quot;renameMember('${cls.indexOf('a')&gt;-1?'A':'B'}',${i},this)&quot; title=&quot;Duplo-clique para renomear&quot;&gt;${n}&lt;/span&gt;`).join('')}
  &lt;/div&gt;`;
  g(`edit-btn-${turma.toLowerCase()}`).textContent = '✏️ Editar';
  buildFolgas();
  render();
}

// ── FOLGAS ──────────────────────────────────────────────
function buildFolgas(){
  g('folgas-grid').innerHTML=getTODOS().map(c=&gt;`
    &lt;button class=&quot;f-btn${folgas.has(c)?' on':''}&quot; onclick=&quot;toggleFolga('${c}')&quot;&gt;${folgas.has(c)?'🏖 ':''}${c}&lt;/button&gt;
  `).join('');
}
function toggleFolga(n){folgas.has(n)?folgas.delete(n):folgas.add(n);buildFolgas();render();}

// ── COLUNAS ──────────────────────────────────────────────
function opts(sel){
  let o='&lt;option value=&quot;&quot;&gt;—&lt;/option&gt;';
  getTODOS().forEach(c=&gt;{
    o+=`&lt;option value=&quot;${c}&quot;${sel===c?' selected':''}&gt;${c}${folgas.has(c)?' 🏖':''}&lt;/option&gt;`;
  });
  return o;
}

const FIXED_BADGES = {
  respcarreta: {
    2: {label:'5S CARRETA', cls:'badge-5scarreta'},
    5: {label:'VAGA',       cls:'badge-vaga'}
  }
};

function saveBadgeEdits(){
  Object.keys(FIXED_BADGES).forEach(areaId=&gt;{
    Object.keys(FIXED_BADGES[areaId]).forEach(rowIdx=&gt;{
      const inp = g(`badge-inp-${areaId}-${rowIdx}`);
      if(inp &amp;&amp; inp.value.trim()) FIXED_BADGES[areaId][rowIdx].label = inp.value.trim().toUpperCase();
    });
  });
}

function buildCols(areas,containerId){
  const wrap=g(containerId);
  wrap.innerHTML='';
  areas.forEach(area=&gt;{
    const col=document.createElement('div');
    col.className='col-block';
    let rows='';
    const areaBadges = FIXED_BADGES[area.id] || {};
    for(let i=0;i&lt;ROWS;i++){
      if(areaBadges[i]){
        const b=areaBadges[i];
        if(areasEditMode){
          rows+=`&lt;div class=&quot;col-row&quot; style=&quot;padding:0;border-top:0.5px solid var(--color-border-tertiary)&quot;&gt;
            &lt;div class=&quot;fixed-badge ${b.cls}&quot; style=&quot;padding:3px 4px&quot;&gt;
              &lt;input class=&quot;area-name-input&quot; id=&quot;badge-inp-${area.id}-${i}&quot; value=&quot;${b.label}&quot; style=&quot;font-size:11px;padding:3px 4px&quot; onkeydown=&quot;if(event.key==='Enter')toggleAreasEdit()&quot;&gt;
            &lt;/div&gt;
          &lt;/div&gt;`;
        } else {
          rows+=`&lt;div class=&quot;col-row&quot; style=&quot;padding:0;border-top:0.5px solid var(--color-border-tertiary)&quot;&gt;
            &lt;div class=&quot;fixed-badge ${b.cls}&quot;&gt;${b.label}&lt;/div&gt;
          &lt;/div&gt;`;
        }
        continue;
      }
      const key=`${area.id}_${i}`;
      const val=state[key];
      const isFolga=val&amp;&amp;folgas.has(val);
      const selClass=val?(isFolga?'folga-sel':''):'empty';
      const dotClass=val?(isFolga?'dot-folga':'dot-ok'):'dot-empty';
      const tagFolga=isFolga?'&lt;span class=&quot;tag tag-folga&quot;&gt;🏖&lt;/span&gt;':'';
      rows+=`&lt;div class=&quot;col-row&quot;&gt;
        &lt;span class=&quot;dot ${dotClass}&quot;&gt;&lt;/span&gt;
        &lt;div class=&quot;sel-wrap${!val?' empty':''}&quot;&gt;
          &lt;select class=&quot;${selClass}&quot; data-key=&quot;${key}&quot; onchange=&quot;onSel(this)&quot;&gt;${opts(val)}&lt;/select&gt;
        &lt;/div&gt;
        ${tagFolga}
      &lt;/div&gt;`;
    }
    col.innerHTML=rows;
    wrap.appendChild(col);
  });
}

function onSel(el){state[el.dataset.key]=el.value;render();}

function render(){
  buildCols(TOP_AREAS,'top-cols');
  buildCols(BOT_AREAS,'bot-cols');
  let aloc=0,folga=0;
  Object.values(state).forEach(v=&gt;{if(v){aloc++;if(folgas.has(v))folga++;}});
  g('s-aloc').textContent=aloc;
  g('s-folga').textContent=folga;
}

// ── DSR ──────────────────────────────────────────────────
let dsrEditMode = false;

function toggleDsrEdit(){
  dsrEditMode = !dsrEditMode;
  const btn = g('dsr-edit-btn');
  if(dsrEditMode){
    btn.textContent = '✅ Salvar';
    g('dsr-body').innerHTML=DSR.map((r,i)=&gt;`
      &lt;div class=&quot;dsr-row&quot;&gt;
        &lt;span class=&quot;dsr-day&quot;&gt;${r.dia}:&lt;/span&gt;
        &lt;input class=&quot;dsr-input&quot; id=&quot;dsr-inp-${i}&quot; value=&quot;${r.ppl}&quot; placeholder=&quot;Nomes...&quot;&gt;
      &lt;/div&gt;
    `).join('');
  } else {
    DSR.forEach((r,i)=&gt;{const inp=g(`dsr-inp-${i}`);if(inp)r.ppl=inp.value;});
    btn.textContent = '✏️ Editar';
    buildDsr();
  }
}

function buildDsr(){
  g('dsr-body').innerHTML=DSR.map(r=&gt;`
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;${r.dia}:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;${r.ppl}&lt;/span&gt;&lt;/div&gt;
  `).join('');
}

// ── INIT ─────────────────────────────────────────────────
g('top-date').innerHTML=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
buildTurmaNames();
buildAreaHeaders();
buildFolgas();
buildDsr();
render();

&lt;/script&gt;

.t-remove{background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}

        &lt;option value=&quot;&quot;&gt;— SELECIONAR —&lt;/option&gt;&lt;option value=&quot;APOIO SORTING&quot;&gt;APOIO SORTING&lt;/option&gt;&lt;option value=&quot;BINGO PM&quot;&gt;BINGO PM&lt;/option&gt;&lt;option value=&quot;EXPEDIÇÃO PM&quot;&gt;EXPEDIÇÃO PM&lt;/option&gt;&lt;option value=&quot;PENDÊNCIAS DE INVENTÁRIO&quot;&gt;PENDÊNCIAS DE INVENTÁRIO&lt;/option&gt;&lt;option value=&quot;COLOCAR STATUS NAS AVARIAS&quot;&gt;COLOCAR STATUS NAS AVARIAS&lt;/option&gt;&lt;option value=&quot;DEVOLUÇÃO XPT&quot;&gt;DEVOLUÇÃO XPT&lt;/option&gt;&lt;option value=&quot;AVARIAS&quot;&gt;AVARIAS&lt;/option&gt;&lt;option value=&quot;REGISTRO APPSHEET GAIOLAS XPT&quot;&gt;REGISTRO APPSHEET GAIOLAS XPT&lt;/option&gt;&lt;option value=&quot;PLANILHA DE CONTROLE DE AVARIA&quot;&gt;PLANILHA DE CONTROLE DE AVARIA&lt;/option&gt;&lt;option value=&quot;PACOTES SEM IDS / SALVADOS&quot;&gt;PACOTES SEM IDS / SALVADOS&lt;/option&gt;
      &lt;/select&gt;&lt;/td&gt;&lt;td&gt;&lt;select class=&quot;ps-select empty&quot; onchange=&quot;onPsSel(1,5,this)&quot;&gt;
        &lt;option value=&quot;&quot;&gt;— SELECIONAR —&lt;/option&gt;&lt;option value=&quot;APOIO SORTING&quot;&gt;APOIO SORTING&lt;/option&gt;&lt;option value=&quot;BINGO PM&quot;&gt;BINGO PM&lt;/option&gt;&lt;option value=&quot;EXPEDIÇÃO PM&quot;&gt;EXPEDIÇÃO PM&lt;/option&gt;&lt;option value=&quot;PENDÊNCIAS DE INVENTÁRIO&quot;&gt;PENDÊNCIAS DE INVENTÁRIO&lt;/option&gt;&lt;option value=&quot;COLOCAR STATUS NAS AVARIAS&quot;&gt;COLOCAR STATUS NAS AVARIAS&lt;/option&gt;&lt;option value=&quot;DEVOLUÇÃO XPT&quot;&gt;DEVOLUÇÃO XPT&lt;/option&gt;&lt;option value=&quot;AVARIAS&quot;&gt;AVARIAS&lt;/option&gt;&lt;option value=&quot;REGISTRO APPSHEET GAIOLAS XPT&quot;&gt;REGISTRO APPSHEET GAIOLAS XPT&lt;/option&gt;&lt;option value=&quot;PLANILHA DE CONTROLE DE AVARIA&quot;&gt;PLANILHA DE CONTROLE DE AVARIA&lt;/option&gt;&lt;option value=&quot;PACOTES SEM IDS / SALVADOS&quot;&gt;PACOTES SEM IDS / SALVADOS&lt;/option&gt;
      &lt;/select&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;

&lt;/div&gt;

&lt;div class=&quot;dsr-wrap&quot;&gt;
  &lt;div class=&quot;dsr-head&quot;&gt;
    &lt;span&gt;📋 DSR SEMANAL&lt;/span&gt;
    &lt;button class=&quot;dsr-edit-btn&quot; id=&quot;dsr-edit-btn&quot; onclick=&quot;toggleDsrEdit()&quot;&gt;✏️ Editar&lt;/button&gt;
  &lt;/div&gt;
  &lt;div id=&quot;dsr-body&quot;&gt;
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Segunda-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Jeferson Martins / Angela&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Terça-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Samuel / Jeferson&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Quarta-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Joseilton / Denis&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Quinta-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Rafael Rodrigues / Adrian&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Sexta-feira:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Sillas / Pedro / Thiago&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Sábado:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;Bruno Rafael / Ana / Lucivânia&lt;/span&gt;&lt;/div&gt;
  
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;Domingo:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;João Victor / Guilherme / Luciano&lt;/span&gt;&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;script&gt;
// ── DADOS ─────────────────────────────────────────────────
let TURMA_A = ['GUILHERME','THIAGO','HITILY','DENIS','BRUNO','JEFERSON MARTINS','ANGELA','GEOVANE'];
let TURMA_B = ['LUCIANO','JOSEILTON','SILLAS','ADRIAN','SAMUEL','RAFAEL','JOÃO VICTOR','JEFERSON','PEDRO'];
function getTODOS(){return [...TURMA_A,...TURMA_B];}
function turmaOf(n){return TURMA_A.includes(n)?'A':TURMA_B.includes(n)?'B':null;}
function renameMember(turma, idx, el){
  el.setAttribute('contenteditable','true');
  el.focus();
  document.execCommand('selectAll', false, null);
  function commit(){
    el.removeEventListener('blur', commit);
    el.removeEventListener('keydown', onKeyDown);
    el.setAttribute('contenteditable','false');
    const novo = el.textContent.trim().toUpperCase();
    const arr = turma==='A' ? TURMA_A : TURMA_B;
    if(novo &amp;&amp; novo !== arr[idx]){ arr[idx] = novo; }
    if(typeof buildTurmaNames==='function') buildTurmaNames();
    if(typeof buildFolgas==='function') buildFolgas();
    if(typeof render==='function') render();
    if(typeof updateMetrics==='function') updateMetrics();
    if(typeof buildPsTable==='function') buildPsTable();
    if(typeof buildResp==='function') buildResp();
  }
  function onKeyDown(ev){ if(ev.key==='Enter'){ ev.preventDefault(); el.blur(); } }
  el.addEventListener('blur', commit);
  el.addEventListener('keydown', onKeyDown);
}


const DSR=[
  {dia:'Segunda-feira',ppl:'Jeferson Martins / Angela'},
  {dia:'Terça-feira',ppl:'Samuel / Jeferson'},
  {dia:'Quarta-feira',ppl:'Joseilton / Denis'},
  {dia:'Quinta-feira',ppl:'Rafael Rodrigues / Adrian'},
  {dia:'Sexta-feira',ppl:'Sillas / Pedro / Thiago'},
  {dia:'Sábado',ppl:'Bruno Rafael / Ana / Lucivânia'},
  {dia:'Domingo',ppl:'João Victor / Guilherme / Luciano'},
];

// ── RESPONSÁVEIS POR VAGAS (4 por fileira, label editável) ──
let RESP_DATA = [
  {label:'VAGAS DE 1 A 6',   resp:['DENIS','','','']},
  {label:'VAGAS DE 7 A 13',  resp:['JEFERSON MARTINS','','','']},
  {label:'VAGAS DE 14 A 25', resp:['JOSEILTON','HITILY','HITILY','HITILY']},
  {label:'VAGAS DE 26 A 39', resp:['JEFERSON','BRUNO','BRUNO','BRUNO']},
];
let respEditMode = false;

function buildResp(){
  const tbody = document.getElementById('resp-tbody');
  tbody.innerHTML = RESP_DATA.map((row,i)=&gt;{
    const labelCell = respEditMode
      ? `&lt;td class=&quot;resp-label&quot;&gt;&lt;input class=&quot;resp-label-input&quot; id=&quot;rl-${i}&quot; value=&quot;${row.label}&quot;&gt;&lt;/td&gt;`
      : `&lt;td class=&quot;resp-label&quot;&gt;${row.label}&lt;/td&gt;`;
    const cells = row.resp.map((nome,j)=&gt;{
      const opts = getTODOS().map(n=&gt;`&lt;option value=&quot;${n}&quot;${nome===n?' selected':''}&gt;${n}&lt;/option&gt;`).join('');
      return `&lt;td class=&quot;resp-cell&quot;&gt;&lt;select class=&quot;resp-select${!nome?' empty':''}&quot; onchange=&quot;onRespSel(${i},${j},this)&quot;&gt;
        &lt;option value=&quot;&quot;&gt;—&lt;/option&gt;${opts}
      &lt;/select&gt;&lt;/td&gt;`;
    }).join('');
    return `&lt;tr class=&quot;resp-row&quot;&gt;${labelCell}${cells}&lt;/tr&gt;`;
  }).join('');
}

function onRespSel(i,j,sel){
  const nome = sel.value;
  RESP_DATA[i].resp[j] = nome;
  if(nome &amp;&amp; folgas.has(nome)){
    sel.className = 'resp-select folga-warn';
    // Remove a animação para poder re-acionar
    sel.style.animation = 'none';
    requestAnimationFrame(()=&gt;{sel.style.animation='';});
    // Toast de aviso
    let toast = document.getElementById('folga-toast');
    if(!toast){
      toast = document.createElement('div');
      toast.id = 'folga-toast';
      toast.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#c62828;color:#fff;font-size:13px;font-weight:800;padding:10px 22px;border-radius:10px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.35);transition:opacity .3s;pointer-events:none';
      document.body.appendChild(toast);
    }
    toast.textContent = '⚠️ ' + nome + ' está de FOLGA!';
    toast.style.opacity = '1';
    clearTimeout(toast._t);
    toast._t = setTimeout(()=&gt;toast.style.opacity='0', 2800);
  } else {
    sel.className = 'resp-select' + (nome?'':' empty');
  }
  updateMetrics();
}

function limparResp(){
  if(!confirm('Limpar todos os responsáveis das vagas?')) return;
  RESP_DATA.forEach(row=&gt;row.resp=row.resp.map(()=&gt;''));
  buildResp();
  updateMetrics();
}

function toggleRespEdit(){
  if(respEditMode){
    RESP_DATA.forEach((row,i)=&gt;{
      const lbl = document.getElementById(`rl-${i}`);
      if(lbl) row.label = lbl.value.trim().toUpperCase();
    });
  }
  respEditMode = !respEditMode;
  document.getElementById('resp-edit-btn').textContent = respEditMode ? '✅ Salvar' : '✏️ Editar';
  buildResp();
  updateMetrics();
}

// ── FOLGAS ───────────────────────────────────────────────
const folgas = new Set();
function buildFolgas(){
  document.getElementById('folgas-grid').innerHTML = getTODOS().map(c=&gt;`
    &lt;button class=&quot;f-btn${folgas.has(c)?' on':''}&quot; onclick=&quot;toggleFolga('${c}')&quot;&gt;${folgas.has(c)?'🏖 ':''}${c}&lt;/button&gt;
  `).join('');
}
function toggleFolga(n){folgas.has(n)?folgas.delete(n):folgas.add(n);buildFolgas();updateMetrics();}

function updateMetrics(){
  let aloc=0,fg=0;
  getTODOS().forEach(n=&gt;{if(folgas.has(n)){fg++;aloc++;}});
  document.getElementById('s-aloc').textContent=aloc;
  document.getElementById('s-folga').textContent=fg;
}

// ── ATRIBUIÇÕES PS DO DIA ────────────────────────────────
let PS_TAREFAS = [
  'APOIO SORTING',
  'BINGO PM',
  'EXPEDIÇÃO PM',
  'PENDÊNCIAS DE INVENTÁRIO',
  'COLOCAR STATUS NAS AVARIAS',
  'DEVOLUÇÃO XPT',
  'AVARIAS',
  'REGISTRO APPSHEET GAIOLAS XPT',
  'PLANILHA DE CONTROLE DE AVARIA',
  'PACOTES SEM IDS / SALVADOS',
];
let psTaskEditMode = false;

// Pessoas (colunas) e suas tarefas (linhas) — máx 6 linhas por pessoa
let PS_PESSOAS = ['GUILHERME','LUCIVANIA'];
const PS_MAX_ROWS = 6;
// state: psData[pessoaIdx][rowIdx] = tarefa string
let psData = PS_PESSOAS.map(()=&gt;Array(PS_MAX_ROWS).fill(''));
let psEditMode = false;

function buildPsTable(){
  const thead = document.getElementById('ps-thead');
  const tbody = document.getElementById('ps-tbody');

  // Header
  if(psEditMode){
    thead.innerHTML = `&lt;tr&gt;
      &lt;th&gt;#&lt;/th&gt;
      ${PS_PESSOAS.map((p,i)=&gt;`
        &lt;th&gt;
          &lt;div style=&quot;display:flex;align-items:center;justify-content:center;gap:4px&quot;&gt;
            &lt;input class=&quot;ps-person-input&quot; id=&quot;psinp-${i}&quot; value=&quot;${p}&quot; placeholder=&quot;Nome...&quot;&gt;
            &lt;button class=&quot;ps-remove-person&quot; onclick=&quot;removePsPessoa(${i})&quot; title=&quot;Remover pessoa&quot;&gt;✕&lt;/button&gt;
          &lt;/div&gt;
        &lt;/th&gt;
      `).join('')}
      &lt;th&gt;&lt;button class=&quot;ps-add-person&quot; onclick=&quot;addPsPessoa()&quot;&gt;+ Pessoa&lt;/button&gt;&lt;/th&gt;
    &lt;/tr&gt;`;
  } else {
    thead.innerHTML = `&lt;tr&gt;
      &lt;th&gt;#&lt;/th&gt;
      ${PS_PESSOAS.map(p=&gt;`&lt;th&gt;&lt;span class=&quot;ps-person-badge&quot;&gt;${p}&lt;/span&gt;&lt;/th&gt;`).join('')}
    &lt;/tr&gt;`;
  }

  // Body
  let rows = '';
  for(let r=0;r&lt;PS_MAX_ROWS;r++){
    const cells = PS_PESSOAS.map((p,pi)=&gt;{
      const val = psData[pi][r] || '';
      const opts = PS_TAREFAS.map(t=&gt;`&lt;option value=&quot;${t}&quot;${val===t?' selected':''}&gt;${t}&lt;/option&gt;`).join('');
      return `&lt;td&gt;&lt;select class=&quot;ps-select${!val?' empty':''}&quot; onchange=&quot;onPsSel(${pi},${r},this)&quot;&gt;
        &lt;option value=&quot;&quot;&gt;— SELECIONAR —&lt;/option&gt;${opts}
      &lt;/select&gt;&lt;/td&gt;`;
    }).join('');
    rows += `&lt;tr&gt;&lt;td&gt;${r+1}&lt;/td&gt;${cells}${psEditMode?'&lt;td&gt;&lt;/td&gt;':''}&lt;/tr&gt;`;
  }
  tbody.innerHTML = rows;
}

function onPsSel(pi,ri,sel){
  psData[pi][ri] = sel.value;
  sel.className = 'ps-select' + (sel.value?'':' empty');
}

function addPsPessoa(){
  PS_PESSOAS.push('NOVO');
  psData.push(Array(PS_MAX_ROWS).fill(''));
  buildPsTable();
}

function removePsPessoa(idx){
  if(PS_PESSOAS.length&lt;=1)return;
  PS_PESSOAS.splice(idx,1);
  psData.splice(idx,1);
  buildPsTable();
}

function togglePsEdit(){
  if(psEditMode){
    // Salvar nomes das pessoas
    PS_PESSOAS = PS_PESSOAS.map((_,i)=&gt;{
      const inp = document.getElementById(`psinp-${i}`);
      return inp ? inp.value.trim().toUpperCase() || PS_PESSOAS[i] : PS_PESSOAS[i];
    });
  }
  psEditMode = !psEditMode;
  document.getElementById('ps-edit-btn').textContent = psEditMode ? '✅ Salvar' : '✏️ Editar';
  buildPsTable();
}

// ── Edição da lista de tarefas PS ─────────────────────────
function renderPsTaskPanel(){
  const panel = document.getElementById('ps-task-panel');
  panel.innerHTML = PS_TAREFAS.map((t,i)=&gt;`
    &lt;div class=&quot;ps-task-edit-row&quot;&gt;
      &lt;input class=&quot;ps-task-input&quot; id=&quot;pstaskinp-${i}&quot; value=&quot;${t}&quot; placeholder=&quot;Nome da tarefa...&quot;&gt;
      &lt;button class=&quot;ps-remove-task&quot; onclick=&quot;removePsTarefa(${i})&quot; title=&quot;Remover tarefa&quot;&gt;✕&lt;/button&gt;
    &lt;/div&gt;
  `).join('') + `&lt;button class=&quot;ps-add-task&quot; onclick=&quot;addPsTarefa()&quot;&gt;+ Tarefa&lt;/button&gt;`;
}

function addPsTarefa(){
  // Salva o que já foi digitado antes de adicionar nova linha
  PS_TAREFAS = PS_TAREFAS.map((t,i)=&gt;{
    const inp = document.getElementById(`pstaskinp-${i}`);
    return inp ? (inp.value.trim().toUpperCase() || t) : t;
  });
  PS_TAREFAS.push('NOVA TAREFA');
  renderPsTaskPanel();
}

function removePsTarefa(idx){
  if(PS_TAREFAS.length&lt;=1)return;
  PS_TAREFAS = PS_TAREFAS.map((t,i)=&gt;{
    const inp = document.getElementById(`pstaskinp-${i}`);
    return inp ? (inp.value.trim().toUpperCase() || t) : t;
  });
  PS_TAREFAS.splice(idx,1);
  renderPsTaskPanel();
}

function togglePsTaskEdit(){
  const panel = document.getElementById('ps-task-panel');
  const btn = document.getElementById('ps-task-edit-btn');
  if(psTaskEditMode){
    // Salvar nomes das tarefas
    PS_TAREFAS = PS_TAREFAS.map((t,i)=&gt;{
      const inp = document.getElementById(`pstaskinp-${i}`);
      return inp ? (inp.value.trim().toUpperCase() || t) : t;
    });
    panel.style.display = 'none';
    btn.textContent = '📝 Tarefas';
    psTaskEditMode = false;
    buildPsTable();
  } else {
    renderPsTaskPanel();
    panel.style.display = 'flex';
    btn.textContent = '✅ Salvar';
    psTaskEditMode = true;
  }
}

// ── DSR ──────────────────────────────────────────────────
let dsrEditMode = false;

function toggleDsrEdit(){
  dsrEditMode = !dsrEditMode;
  const btn = document.getElementById('dsr-edit-btn');
  if(dsrEditMode){
    btn.textContent = '✅ Salvar';
    document.getElementById('dsr-body').innerHTML = DSR.map((r,i)=&gt;`
      &lt;div class=&quot;dsr-row&quot;&gt;
        &lt;span class=&quot;dsr-day&quot;&gt;${r.dia}:&lt;/span&gt;
        &lt;input class=&quot;dsr-input&quot; id=&quot;dsr-inp-${i}&quot; value=&quot;${r.ppl}&quot; placeholder=&quot;Nomes...&quot;&gt;
      &lt;/div&gt;
    `).join('');
  } else {
    DSR.forEach((r,i)=&gt;{const inp=document.getElementById(`dsr-inp-${i}`);if(inp)r.ppl=inp.value;});
    btn.textContent = '✏️ Editar';
    buildDsr();
  }
}

function buildDsr(){
  document.getElementById('dsr-body').innerHTML = DSR.map(r=&gt;`
    &lt;div class=&quot;dsr-row&quot;&gt;&lt;span class=&quot;dsr-day&quot;&gt;${r.dia}:&lt;/span&gt;&lt;span class=&quot;dsr-ppl&quot;&gt;${r.ppl}&lt;/span&gt;&lt;/div&gt;
  `).join('');
}

// ── TURMAS ───────────────────────────────────────────────
let turnoEditMode = {A:false,B:false};

function buildTurmaNames(){
  const renderList=(arr,cls)=&gt;arr.map((n,i)=&gt;`&lt;span class=&quot;t-name ${cls}&quot; ondblclick=&quot;renameMember('${cls.indexOf('a')&gt;-1?'A':'B'}',${i},this)&quot; title=&quot;Duplo-clique para renomear&quot;&gt;${n}&lt;/span&gt;`).join('');
  document.getElementById('turma-a-names').innerHTML = renderList(TURMA_A,'t-a-name');
  document.getElementById('turma-b-names').innerHTML = renderList(TURMA_B,'t-b-name');
}

function toggleTurnoEdit(turma){
  const t = turma;
  turnoEditMode[t] = !turnoEditMode[t];
  const btn = document.getElementById(`edit-btn-${t.toLowerCase()}`);
  const bodyEl = document.getElementById(`turma-${t.toLowerCase()}-body`);
  if(turnoEditMode[t]){
    btn.textContent = '✅ Salvar';
    const arr = t==='A'?TURMA_A:TURMA_B;
    const cls = t==='A'?'a':'b';
    bodyEl.innerHTML = `
      &lt;div class=&quot;turno-edit-area&quot;&gt;
        &lt;div class=&quot;turno-edit-list&quot; id=&quot;edit-list-${t}&quot;&gt;
          ${arr.map((n,i)=&gt;`
            &lt;span class=&quot;t-name-edit t-${cls}-name-edit&quot;&gt;
              ${n}
              &lt;button class=&quot;t-remove&quot; onclick=&quot;removeFromTurma('${t}',${i})&quot;&gt;✕&lt;/button&gt;
            &lt;/span&gt;
          `).join('')}
        &lt;/div&gt;
        &lt;div class=&quot;turno-add-row&quot;&gt;
          &lt;input class=&quot;turno-add-input${cls==='b'?' tb':''}&quot; id=&quot;add-inp-${t}&quot; placeholder=&quot;Novo colaborador...&quot; onkeydown=&quot;if(event.key==='Enter')addToTurma('${t}')&quot;&gt;
          &lt;button class=&quot;turno-add-btn${cls==='b'?' tb':''}&quot; onclick=&quot;addToTurma('${t}')&quot;&gt;+ Adicionar&lt;/button&gt;
        &lt;/div&gt;
      &lt;/div&gt;`;
  } else {
    btn.textContent = '✏️ Editar';
    const arr = t==='A'?TURMA_A:TURMA_B;
    const cls = t==='A'?'t-a-name':'t-b-name';
    bodyEl.innerHTML = `&lt;div class=&quot;turno-body&quot; id=&quot;turma-${t.toLowerCase()}-names&quot;&gt;
      ${arr.map((n,i)=&gt;`&lt;span class=&quot;t-name ${cls}&quot; ondblclick=&quot;renameMember('${cls.indexOf('a')&gt;-1?'A':'B'}',${i},this)&quot; title=&quot;Duplo-clique para renomear&quot;&gt;${n}&lt;/span&gt;`).join('')}
    &lt;/div&gt;`;
    buildFolgas();
    updateMetrics();
  }
}

function removeFromTurma(turma,idx){
  const arr = turma==='A'?TURMA_A:TURMA_B;
  arr.splice(idx,1);
  turnoEditMode[turma] = false;

<script>
// ── SALVAR VIA CLAUDE STORAGE ──
let savedFileHandle = null;

// Coleta o estado de todos os iframes e salva no Claude Storage
// ── JSONBIN — banco de dados gratuito na nuvem ────────────
// Chave e bin criados automaticamente na primeira vez
const JSONBIN_API_KEY = '$2a$10$l6ipcFzVkXELz9iS0n8FX.gyxgvYnDV.cw3fMc6jmBBp2Gz1kv1R.';
let JSONBIN_BIN_ID = '6a3b45c1f5f4af5e2926a52f';

async function coletarEstado() {
  const frameData = {};
  ['frame-tab1','frame-tab2','frame-tab3'].forEach(fid => {
    try {
      const iframe = document.getElementById(fid);
      if(!iframe) return;
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      if(!doc) return;

      const selects = {};
      doc.querySelectorAll('select[data-key]').forEach(sel => {
        selects[sel.dataset.key] = sel.value;
      });

      const turmaA = [], turmaB = [];
      doc.querySelectorAll('#turma-a-names .t-name').forEach(el => turmaA.push(el.textContent.trim()));
      doc.querySelectorAll('#turma-b-names .t-name').forEach(el => turmaB.push(el.textContent.trim()));

      const folgas = [];
      doc.querySelectorAll('.f-btn.on').forEach(el => folgas.push(el.textContent.replace('🏖 ','').trim()));

      const dsr = [];
      doc.querySelectorAll('.dsr-row').forEach(row => {
        const dia = row.querySelector('.dsr-day');
        const ppl = row.querySelector('.dsr-ppl');
        if(dia && ppl) dsr.push({dia: dia.textContent.replace(':','').trim(), ppl: ppl.textContent.trim()});
      });

      const respSelects = {};
      doc.querySelectorAll('.resp-select').forEach((sel, i) => {
        respSelects['resp_' + i] = sel.value;
      });

      const psSels = {};
      doc.querySelectorAll('.ps-select').forEach((sel, i) => {
        psSels['ps_' + i] = sel.value;
      });

      frameData[fid] = { selects, turmaA, turmaB, folgas, dsr, respSelects, psSels };
    } catch(e) {
      console.warn('Erro ao coletar ' + fid, e);
    }
  });

  const tabLabels = [];
  document.querySelectorAll('.tab-label').forEach(el => tabLabels.push(el.textContent.trim()));

  return { frameData, tabLabels, savedAt: new Date().toLocaleString('pt-BR') };
}

async function saveUpdatedVersion(){
  const btn = document.getElementById('save-version-btn');
  const originalText = btn.textContent;
  btn.textContent = '⏳ Salvando...';
  btn.disabled = true;

  try {
    const payload = await coletarEstado();

    // Usa JSONBin para salvar na nuvem
    let url, method;
    if(JSONBIN_BIN_ID){
      url = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
      method = 'PUT';
    } else {
      url = 'https://api.jsonbin.io/v3/b';
      method = 'POST';
    }

    const res = await fetch(url, {
      method,
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_API_KEY,
        'X-Bin-Name': 'distribuicao-estado',
        'X-Bin-Private': 'false'
      },
      body: JSON.stringify(payload)
    });

    if(!res.ok) throw new Error('Erro HTTP ' + res.status);
    const data = await res.json();

    btn.textContent = '✅ Salvo na nuvem!';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = originalText; }, 3000);

  } catch(err) {
    console.error('Erro ao salvar:', err);
    // Fallback: salva no localStorage mesmo
    try {
      const payload = await coletarEstado();
      localStorage.setItem('dist-estado-local', JSON.stringify(payload));
      btn.textContent = '⚠️ Salvo localmente';
    } catch(e2) {
      btn.textContent = '⚠️ Erro ao salvar';
    }
    btn.disabled = false;
    setTimeout(() => { btn.textContent = originalText; }, 3000);
  }
}

function aplicarEstado(payload) {
  const { frameData, tabLabels } = payload;

  if(tabLabels){
    const labels = document.querySelectorAll('.tab-label');
    tabLabels.forEach((txt, i) => { if(labels[i]) labels[i].textContent = txt; });
  }

  const frameIds = ['frame-tab1','frame-tab2','frame-tab3'];
  for(const fid of frameIds){
    const data = frameData[fid];
    if(!data) continue;
    const iframe = document.getElementById(fid);
    if(!iframe) continue;

    const tryRestore = () => {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if(!doc || doc.readyState !== 'complete') return false;

        // 1) Restaura membros das turmas PRIMEIRO (colaboradores)
        if(data.turmaA && data.turmaA.length && doc.defaultView.TURMA_A){
          const win = doc.defaultView;
          win.TURMA_A.length = 0;
          data.turmaA.forEach(n => win.TURMA_A.push(n));
          win.TURMA_B.length = 0;
          (data.turmaB || []).forEach(n => win.TURMA_B.push(n));
          if(typeof win.buildTurmaNames === 'function') win.buildTurmaNames();
          if(typeof win.buildFolgas === 'function') win.buildFolgas();
          if(typeof win.buildResp === 'function') win.buildResp();
          if(typeof win.buildPsTable === 'function') win.buildPsTable();
          if(typeof win.updateMetrics === 'function') win.updateMetrics();
        }

        // 2) Restaura seleções DEPOIS (aguarda DOM ser reconstruído)
        setTimeout(() => {
          try {
            if(data.selects){
              Object.entries(data.selects).forEach(([key, val]) => {
                const sel = doc.querySelector(`select[data-key="${key}"]`);
                if(sel && val) { sel.value = val; sel.dispatchEvent(new Event('change')); }
              });
            }

            if(data.respSelects){
              const respSels = doc.querySelectorAll('.resp-select');
              respSels.forEach((sel, i) => {
                const val = data.respSelects['resp_' + i];
                if(val) { sel.value = val; sel.dispatchEvent(new Event('change')); }
              });
            }

            if(data.psSels){
              const psSels = doc.querySelectorAll('.ps-select');
              psSels.forEach((sel, i) => {
                const val = data.psSels['ps_' + i];
                if(val) { sel.value = val; sel.dispatchEvent(new Event('change')); }
              });
            }

            if(data.folgas && data.folgas.length){
              const fBtns = doc.querySelectorAll('.f-btn');
              fBtns.forEach(btn => {
                const nome = btn.textContent.replace('🏖 ','').trim();
                if(data.folgas.includes(nome)) btn.classList.add('on');
              });
              if(typeof doc.defaultView.updateMetrics === 'function') doc.defaultView.updateMetrics();
            }
          } catch(e2) { console.warn('Erro ao restaurar seleções:', e2); }
        }, 300);

        return true;
      } catch(e) { return false; }
    };

    if(!tryRestore()){
      iframe.addEventListener('load', tryRestore, { once: true });
    }
  }
}

async function restoreFromStorage(){
  try {
    // 1) Tenta buscar do JSONBin
    if(JSONBIN_BIN_ID){
      const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
      });
      if(res.ok){
        const data = await res.json();
        aplicarEstado(data.record);
        return;
      }
    }
    // 2) Fallback: localStorage
    const local = localStorage.getItem('dist-estado-local');
    if(local) aplicarEstado(JSON.parse(local));
  } catch(e) {
    console.log('Sem estado salvo ainda.', e);
    // Fallback localStorage
    try {
      const local = localStorage.getItem('dist-estado-local');
      if(local) aplicarEstado(JSON.parse(local));
    } catch(e2) {}
  }
}

// Restaura ao carregar
window.addEventListener('load', () => {
  setTimeout(restoreFromStorage, 800);
});

function switchTab(tabId, btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');
}

// ── NOMES DAS ABAS EDITÁVEIS (só com duplo-clique) ───────
function enableLabelEdit(event){
  event.stopPropagation();
  const label = event.target;
  label.contentEditable = 'true';
  label.classList.add('editing');
  label.focus();
  document.execCommand('selectAll', false, null);
}

function handleLabelClick(event){
  if(event.target.classList.contains('editing')){
    event.stopPropagation();
  }
}

function handleLabelKeydown(event){
  if(event.key === 'Enter'){
    event.preventDefault();
    event.target.blur();
  }
}

document.addEventListener('blur', function(event){
  if(event.target.classList && event.target.classList.contains('tab-label')){
    event.target.contentEditable = 'false';
    event.target.classList.remove('editing');
  }
}, true);
</script>
